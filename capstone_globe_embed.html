function spiral(items, cLat, cLng, r) {
  const n = items.length;
  return items.map((t, i) => {
    if (n === 1) return { ...t, lat: cLat, lng: cLng };
    const angle = (i / n) * 2 * Math.PI;
    const rad = r * (0.3 + 0.7 * (i / Math.max(n - 1, 1)));
    return { ...t, lat: cLat + rad * Math.cos(angle), lng: cLng + rad * Math.sin(angle) / Math.cos(cLat * Math.PI / 180) };
  });
}

function ll3(lat, lng, r) {
  const phi = (90 - lat) * Math.PI / 180, th = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(-r * Math.sin(phi) * Math.cos(th), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(th));
}

const dotMeshes = [];

theses.forEach(t => {
  const pos = ll3(t.lat, t.lng, R + 0.022);
  const dot = new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({ color: CATS[t.cats[0]].color }));
  dot.position.copy(pos);
  dot.userData = { t, pc: CATS[t.cats[0]].color };
  world.add(dot); dotMeshes.push(dot);
  if (t.award) {
    const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: AW }));
    ring.position.copy(pos);
    ring.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), pos.clone().normalize());
    world.add(ring); dot.userData.ring = ring;
  }
});

function updateDots() {
  dotMeshes.forEach(d => {
    const t = d.userData.t;
    if (!activeCategory) {
      d.material.color.setHex(d.userData.pc); d.material.transparent = false; d.material.opacity = 1; d.scale.setScalar(1);
      if (d.userData.ring) { d.userData.ring.material.transparent = false; d.userData.ring.material.opacity = 1; }
    } else if (t.cats.includes(activeCategory)) {
      d.material.color.setHex(CATS[activeCategory].color); d.material.transparent = false; d.material.opacity = 1; d.scale.setScalar(1.4);
      if (d.userData.ring) { d.userData.ring.material.transparent = true; d.userData.ring.material.opacity = 0.5; }
    } else {
      d.material.color.setHex(0xd5d3ce); d.material.transparent = true; d.material.opacity = 0.2; d.scale.setScalar(0.7);
      if (d.userData.ring) { d.userData.ring.material.transparent = true; d.userData.ring.material.opacity = 0.08; }
    }
  });
}

const mouse = new THREE.Vector2(-999, -999);
const ray = new THREE.Raycaster();
let isDrag = false, didDrag = false, pm = { x: 0, y: 0 }, autoRot = true;
let rotY = 0, rotX = -0.3;

cv.addEventListener('touchstart', e => {
  isDrag = true; didDrag = false;
  pm = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  autoRot = false;
}, { passive: true });
cv.addEventListener('touchmove', e => {
  if (!isDrag) return;
  const dx = e.touches[0].clientX - pm.x, dy = e.touches[0].clientY - pm.y;
  if (Math.abs(dx) > 1 || Math.abs(dy) > 1) didDrag = true;
  rotY += dx * 0.004;
  rotX = Math.max(-1.2, Math.min(1.2, rotX - dy * 0.004));
  pm = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
cv.addEventListener('touchend', () => {
  isDrag = false;
  clearTimeout(window._cecRt);
  window._cecRt = setTimeout(() => { autoRot = true; }, 3000);
});

cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  if (isDrag) {
    const dx = e.clientX - pm.x, dy = e.clientY - pm.y;
    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) didDrag = true;
    rotY += dx * 0.004;
    rotX = Math.max(-1.2, Math.min(1.2, rotX - dy * 0.004));
    pm = { x: e.clientX, y: e.clientY }; autoRot = false;
  }
});
cv.addEventListener('mousedown', e => { isDrag = true; didDrag = false; pm = { x: e.clientX, y: e.clientY }; });
cv.addEventListener('mouseup', () => {
  isDrag = false;
  if (!didDrag) {
    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(dotMeshes);
    if (hits.length > 0) {
      const t = hits[0].object.userData.t;
      document.getElementById('cec-ip-city').textContent = t.city;
      document.getElementById('cec-ip-building').textContent = t.building;
      const aw = document.getElementById('cec-ip-award'), pub = document.getElementById('cec-ip-pub');
      if (t.award) {
        aw.textContent = '★ ' + t.award; aw.style.display = 'block';
        pub.style.display = t.published ? 'block' : 'none';
        if (t.published) pub.textContent = 'Published · UC Berkeley eScholarship';
      } else { aw.style.display = 'none'; pub.style.display = 'none'; }
      const cats = document.getElementById('cec-ip-cats'); cats.innerHTML = '';
      t.cats.forEach(c => {
        const s = document.createElement('span');
        s.className = 'cec-pill'; s.style.color = CATS[c].hex; s.textContent = c;
        cats.appendChild(s);
      });
      document.getElementById('cec-ip').style.display = 'block';
      autoRot = false; clearTimeout(window._cecRt);
      window._cecRt = setTimeout(() => { autoRot = true; }, 5000);
    } else { document.getElementById('cec-ip').style.display = 'none'; }
  }
});
cv.addEventListener('mouseleave', () => { isDrag = false; mouse.set(-999, -999); });

function animate() {
  requestAnimationFrame(animate);
  if (autoRot && !isDrag) rotY += 0.0013;
  world.rotation.set(rotX, rotY, 0, 'YXZ');
  ray.setFromCamera(mouse, camera);
  cv.style.cursor = ray.intersectObjects(dotMeshes).length > 0 ? 'pointer' : 'grab';
  renderer.render(scene, camera);
}
animate();

})();
</script>
